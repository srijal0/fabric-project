<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Selvage — Fabric &amp; Material Catalog</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap');

:root{
  --bone:#EDE6D6;
  --bone-2:#E4DBC7;
  --ink:#2B2620;
  --indigo:#3B4B6B;
  --rust:#A8542E;
  --sage:#6B7B5E;
  --gold:#C9A227;
  --line:rgba(43,38,32,0.18);
  --card:#F7F3E9;
}
*{box-sizing:border-box;}
body{
  margin:0;
  background:var(--bone);
  color:var(--ink);
  font-family:'Inter',sans-serif;
  min-height:100vh;
}
.mono{font-family:'IBM Plex Mono',monospace;}
.display{font-family:'Fraunces',serif;}

/* ---- stitched divider ---- */
.stitch{
  border:none;
  height:1px;
  background-image:repeating-linear-gradient(to right, var(--line) 0 6px, transparent 6px 12px);
}

/* ---- header ---- */
header.top{
  padding:28px 32px 20px;
  border-bottom:2px solid var(--ink);
  display:flex;
  justify-content:space-between;
  align-items:flex-end;
  flex-wrap:wrap;
  gap:16px;
}
header.top .brand{display:flex;flex-direction:column;gap:2px;}
header.top .brand .eyebrow{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color:var(--rust);
}
header.top h1{
  margin:0;
  font-size:34px;
  font-weight:600;
  letter-spacing:-0.01em;
}
.stats-bar{
  display:flex;
  gap:28px;
  flex-wrap:wrap;
}
.stat{display:flex;flex-direction:column;gap:2px;min-width:90px;}
.stat .num{font-family:'Fraunces',serif;font-size:26px;font-weight:600;}
.stat .lbl{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:0.1em;text-transform:uppercase;opacity:0.65;}

/* ---- layout ---- */
.layout{display:flex;gap:0;align-items:flex-start;}
aside{
  width:230px;
  flex-shrink:0;
  padding:24px 18px;
  border-right:1px solid var(--line);
  min-height:calc(100vh - 130px);
  position:sticky; top:0;
}
aside h3{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;
  letter-spacing:0.12em;
  text-transform:uppercase;
  opacity:0.6;
  margin:0 0 10px;
}
.cat-btn{
  display:block;
  width:100%;
  text-align:left;
  padding:8px 10px;
  border:none;
  background:transparent;
  font-family:'Inter',sans-serif;
  font-size:14px;
  color:var(--ink);
  border-radius:3px;
  cursor:pointer;
  margin-bottom:2px;
}
.cat-btn:hover{background:var(--bone-2);}
.cat-btn.active{background:var(--indigo);color:var(--card);}
.cat-count{float:right;opacity:0.6;font-family:'IBM Plex Mono',monospace;font-size:11px;}
.cat-btn.active .cat-count{opacity:0.85;color:var(--card);}

main{flex:1;padding:24px 32px;}
.toolbar{
  display:flex;gap:12px;align-items:center;margin-bottom:20px;flex-wrap:wrap;
}
.search-wrap{
  flex:1; min-width:220px;
  position:relative;
}
input[type=text], input[type=search], select, textarea, input[type=number]{
  font-family:'Inter',sans-serif;
  border:1px solid var(--line);
  background:var(--card);
  padding:9px 12px;
  border-radius:4px;
  font-size:14px;
  color:var(--ink);
  width:100%;
}
input:focus, select:focus, textarea:focus{outline:2px solid var(--indigo); outline-offset:1px;}
select{width:auto;}
.btn{
  font-family:'Inter',sans-serif;
  font-weight:600;
  font-size:14px;
  padding:10px 16px;
  border-radius:4px;
  border:1px solid var(--ink);
  background:var(--ink);
  color:var(--card);
  cursor:pointer;
}
.btn:hover{background:var(--indigo);border-color:var(--indigo);}
.btn.ghost{background:transparent;color:var(--ink);}
.btn.ghost:hover{background:var(--bone-2);}
.btn.danger{background:var(--rust);border-color:var(--rust);}

/* ---- swatch grid ---- */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(220px, 1fr));
  gap:20px;
}
.swatch-card{
  position:relative;
  background:var(--card);
  border:1px solid var(--line);
  border-radius:8px;
  padding:16px 16px 14px;
  cursor:pointer;
  transition:transform .12s ease, box-shadow .12s ease;
}
.swatch-card:hover{transform:translateY(-2px); box-shadow:0 6px 18px rgba(43,38,32,0.12);}
.swatch-card .hole{
  position:absolute;
  top:12px; left:12px;
  width:12px;height:12px;
  border-radius:50%;
  background:var(--bone);
  border:2px solid var(--line);
}
.swatch-block{
  width:100%; height:70px;
  border-radius:4px;
  margin-bottom:12px;
  border:1px solid rgba(0,0,0,0.15);
}
.swatch-card h4{
  margin:0 0 3px; font-family:'Fraunces',serif; font-size:18px; font-weight:600;
}
.swatch-card .comp{font-size:12px; opacity:0.7; margin-bottom:8px; min-height:16px;}
.swatch-meta{display:flex; justify-content:space-between; font-family:'IBM Plex Mono',monospace; font-size:11px; opacity:0.75;}
.stock-flag{
  display:inline-block; margin-top:8px; font-family:'IBM Plex Mono',monospace; font-size:10px;
  padding:3px 7px; border-radius:3px; letter-spacing:0.05em;
}
.stock-ok{background:rgba(107,123,94,0.18); color:var(--sage);}
.stock-low{background:rgba(168,84,46,0.18); color:var(--rust);}

.empty{
  text-align:center; padding:60px 20px; opacity:0.7;
}

/* ---- modal ---- */
.overlay{
  position:fixed; inset:0; background:rgba(43,38,32,0.55);
  display:flex; align-items:center; justify-content:center; z-index:50; padding:20px;
}
.modal{
  background:var(--card); border-radius:8px; width:100%; max-width:560px;
  max-height:88vh; overflow-y:auto; padding:26px 28px; border:1px solid var(--line);
}
.modal h2{font-family:'Fraunces',serif; margin-top:0;}
.form-row{display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:12px;}
.form-row.full{grid-template-columns:1fr;}
label{font-family:'IBM Plex Mono',monospace; font-size:10px; text-transform:uppercase; letter-spacing:0.08em; opacity:0.65; display:block; margin-bottom:4px;}
.modal-actions{display:flex; justify-content:flex-end; gap:10px; margin-top:18px;}
.detail-actions{display:flex; gap:10px; margin-top:20px;}

@media (max-width:760px){
  .layout{flex-direction:column;}
  aside{width:100%; position:static; min-height:auto; border-right:none; border-bottom:1px solid var(--line);}
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header class="top">
  <div class="brand">
    <span class="eyebrow">Textile Inventory Prototype</span>
    <h1 class="display">Selvage — Fabric &amp; Material Catalog</h1>
  </div>
  <div class="stats-bar" id="statsBar"></div>
</header>

<div class="layout">
  <aside>
    <h3>Categories</h3>
    <div id="catList"></div>
    <hr class="stitch" style="margin:18px 0;">
    <h3>Sort by</h3>
    <select id="sortSelect" style="width:100%;">
      <option value="name">Name (A–Z)</option>
      <option value="stockLow">Stock (low first)</option>
      <option value="priceLow">Price (low first)</option>
      <option value="priceHigh">Price (high first)</option>
      <option value="newest">Recently added</option>
    </select>
  </aside>

  <main>
    <div class="toolbar">
      <div class="search-wrap">
        <input type="search" id="searchInput" placeholder="Search by name, SKU, supplier, composition…">
      </div>
      <button class="btn" id="addBtn">+ Add Fabric</button>
      <button class="btn ghost" id="resetBtn">Refresh</button>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="emptyState" style="display:none;">No fabrics match this search.</div>
  </main>
</div>

<div id="modalRoot"></div>

<script>
const CATEGORIES = ["Cotton","Linen","Silk","Wool","Denim","Polyester","Rayon/Viscose","Knit","Blend"];
const LOW_STOCK_THRESHOLD = 20;

let fabrics = [];
let activeCategory = "All";
let searchTerm = "";
let sortMode = "name";

function skuFor(category, name){
  const catCode = category.slice(0,3).toUpperCase();
  const nameCode = name.replace(/[^A-Za-z]/g,'').slice(0,3).toUpperCase();
  return catCode + '-' + nameCode + '-' + Math.floor(100+Math.random()*900);
}

const API_BASE = "http://127.0.0.1:8000";

// ---- field mapping: backend uses snake_case, frontend uses camelCase ----
function fromApi(f){
  return {
    id: f.id,
    name: f.name,
    sku: f.sku,
    category: f.category,
    composition: f.composition,
    colorName: f.color_name,
    colorHex: f.color_hex,
    pattern: f.pattern,
    weightGsm: f.weight_gsm,
    widthCm: f.width_cm,
    pricePerMeter: f.price_per_meter,
    stockMeters: f.stock_meters,
    supplier: f.supplier,
    season: f.season,
    usage: f.usage,
    care: f.care,
    notes: f.notes,
    dateAdded: (f.date_added || 0) * 1000
  };
}

function toApi(f){
  return {
    name: f.name,
    sku: f.sku,
    category: f.category,
    composition: f.composition,
    color_name: f.colorName,
    color_hex: f.colorHex,
    pattern: f.pattern,
    weight_gsm: f.weightGsm,
    width_cm: f.widthCm,
    price_per_meter: f.pricePerMeter,
    stock_meters: f.stockMeters,
    supplier: f.supplier,
    season: f.season,
    usage: f.usage,
    care: f.care,
    notes: f.notes
  };
}

async function loadFabrics(){
  try{
    const res = await fetch(`${API_BASE}/fabrics`);
    if(!res.ok) throw new Error('Request failed: ' + res.status);
    const data = await res.json();
    fabrics = data.map(fromApi);
  }catch(e){
    console.error("Could not reach the API", e);
    document.getElementById('grid').innerHTML =
      `<div class="empty">Can't reach the backend at ${API_BASE}.<br>Make sure <code>uvicorn main:app --reload</code> is running, then refresh this page.</div>`;
    fabrics = [];
  }
  render();
}

async function createFabric(data){
  const payload = toApi({ ...data, sku: skuFor(data.category, data.name) });
  const res = await fetch(`${API_BASE}/fabrics`, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  if(!res.ok) throw new Error('Create failed');
  return fromApi(await res.json());
}

async function updateFabricApi(id, data){
  const res = await fetch(`${API_BASE}/fabrics/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(toApi(data))
  });
  if(!res.ok) throw new Error('Update failed');
  return fromApi(await res.json());
}

async function deleteFabricApi(id){
  const res = await fetch(`${API_BASE}/fabrics/${id}`, { method: 'DELETE' });
  if(!res.ok) throw new Error('Delete failed');
}

function renderCategories(){
  const counts = { All: fabrics.length };
  CATEGORIES.forEach(c => counts[c] = fabrics.filter(f=>f.category===c).length);
  const list = document.getElementById('catList');
  list.innerHTML = '';
  ["All", ...CATEGORIES].forEach(cat=>{
    const btn = document.createElement('button');
    btn.className = 'cat-btn' + (activeCategory===cat ? ' active':'');
    btn.innerHTML = `${cat} <span class="cat-count">${counts[cat] ?? 0}</span>`;
    btn.onclick = ()=>{ activeCategory = cat; render(); };
    list.appendChild(btn);
  });
}

function renderStats(){
  const total = fabrics.length;
  const totalStock = fabrics.reduce((a,f)=>a+Number(f.stockMeters||0),0);
  const lowStock = fabrics.filter(f=>Number(f.stockMeters)<LOW_STOCK_THRESHOLD).length;
  const cats = new Set(fabrics.map(f=>f.category)).size;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat"><span class="num">${total}</span><span class="lbl">Fabrics</span></div>
    <div class="stat"><span class="num">${totalStock.toLocaleString()}m</span><span class="lbl">Total Stock</span></div>
    <div class="stat"><span class="num" style="color:${lowStock? 'var(--rust)':'inherit'}">${lowStock}</span><span class="lbl">Low Stock</span></div>
    <div class="stat"><span class="num">${cats}</span><span class="lbl">Categories</span></div>
  `;
}

function getFiltered(){
  let list = fabrics.slice();
  if(activeCategory !== "All") list = list.filter(f=>f.category===activeCategory);
  if(searchTerm.trim()){
    const q = searchTerm.toLowerCase();
    list = list.filter(f =>
      f.name.toLowerCase().includes(q) ||
      f.sku.toLowerCase().includes(q) ||
      (f.supplier||'').toLowerCase().includes(q) ||
      (f.composition||'').toLowerCase().includes(q)
    );
  }
  switch(sortMode){
    case 'stockLow': list.sort((a,b)=>a.stockMeters-b.stockMeters); break;
    case 'priceLow': list.sort((a,b)=>a.pricePerMeter-b.pricePerMeter); break;
    case 'priceHigh': list.sort((a,b)=>b.pricePerMeter-a.pricePerMeter); break;
    case 'newest': list.sort((a,b)=>b.dateAdded-a.dateAdded); break;
    default: list.sort((a,b)=>a.name.localeCompare(b.name));
  }
  return list;
}

function renderGrid(){
  const grid = document.getElementById('grid');
  const empty = document.getElementById('emptyState');
  const list = getFiltered();
  grid.innerHTML = '';
  empty.style.display = list.length ? 'none' : 'block';
  list.forEach(f=>{
    const low = Number(f.stockMeters) < LOW_STOCK_THRESHOLD;
    const card = document.createElement('div');
    card.className = 'swatch-card';
    card.innerHTML = `
      <div class="hole"></div>
      <div class="swatch-block" style="background:${f.colorHex}"></div>
      <h4>${escapeHtml(f.name)}</h4>
      <div class="comp">${escapeHtml(f.composition||'')}</div>
      <div class="swatch-meta"><span>${f.sku}</span><span>$${Number(f.pricePerMeter).toFixed(2)}/m</span></div>
      <span class="stock-flag ${low?'stock-low':'stock-ok'}">${f.stockMeters}m ${low?'· LOW':'in stock'}</span>
    `;
    card.onclick = ()=>openDetail(f.id);
    grid.appendChild(card);
  });
}

function escapeHtml(s){
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

function render(){
  renderCategories();
  renderStats();
  renderGrid();
}

/* ---------- Modals ---------- */
function closeModal(){ document.getElementById('modalRoot').innerHTML = ''; }

function fieldsForm(f={}){
  return `
    <div class="form-row">
      <div><label>Fabric name</label><input type="text" id="f_name" value="${escapeHtml(f.name||'')}"></div>
      <div><label>Category</label>
        <select id="f_category" style="width:100%;">
          ${CATEGORIES.map(c=>`<option value="${c}" ${f.category===c?'selected':''}>${c}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="form-row full">
      <div><label>Composition</label><input type="text" id="f_composition" placeholder="e.g. 60% cotton, 40% polyester" value="${escapeHtml(f.composition||'')}"></div>
    </div>
    <div class="form-row">
      <div><label>Color name</label><input type="text" id="f_colorName" value="${escapeHtml(f.colorName||'')}"></div>
      <div><label>Swatch color</label><input type="color" id="f_colorHex" value="${f.colorHex||'#cccccc'}" style="height:38px;padding:2px;"></div>
    </div>
    <div class="form-row">
      <div><label>Pattern / weave</label><input type="text" id="f_pattern" value="${escapeHtml(f.pattern||'')}"></div>
      <div><label>Weight (GSM)</label><input type="number" id="f_weightGsm" value="${f.weightGsm??''}"></div>
    </div>
    <div class="form-row">
      <div><label>Width (cm)</label><input type="number" id="f_widthCm" value="${f.widthCm??''}"></div>
      <div><label>Price per meter ($)</label><input type="number" step="0.01" id="f_pricePerMeter" value="${f.pricePerMeter??''}"></div>
    </div>
    <div class="form-row">
      <div><label>Stock (meters)</label><input type="number" id="f_stockMeters" value="${f.stockMeters??''}"></div>
      <div><label>Supplier</label><input type="text" id="f_supplier" value="${escapeHtml(f.supplier||'')}"></div>
    </div>
    <div class="form-row">
      <div><label>Season</label><input type="text" id="f_season" placeholder="e.g. Summer, All-season" value="${escapeHtml(f.season||'')}"></div>
      <div><label>Usage</label><input type="text" id="f_usage" placeholder="e.g. Shirting, dresses" value="${escapeHtml(f.usage||'')}"></div>
    </div>
    <div class="form-row full">
      <div><label>Care instructions</label><textarea id="f_care" rows="2">${escapeHtml(f.care||'')}</textarea></div>
    </div>
    <div class="form-row full">
      <div><label>Notes</label><textarea id="f_notes" rows="2">${escapeHtml(f.notes||'')}</textarea></div>
    </div>
  `;
}

function readForm(){
  return {
    name: document.getElementById('f_name').value.trim() || 'Untitled fabric',
    category: document.getElementById('f_category').value,
    composition: document.getElementById('f_composition').value.trim(),
    colorName: document.getElementById('f_colorName').value.trim(),
    colorHex: document.getElementById('f_colorHex').value,
    pattern: document.getElementById('f_pattern').value.trim(),
    weightGsm: Number(document.getElementById('f_weightGsm').value)||0,
    widthCm: Number(document.getElementById('f_widthCm').value)||0,
    pricePerMeter: Number(document.getElementById('f_pricePerMeter').value)||0,
    stockMeters: Number(document.getElementById('f_stockMeters').value)||0,
    supplier: document.getElementById('f_supplier').value.trim(),
    season: document.getElementById('f_season').value.trim(),
    usage: document.getElementById('f_usage').value.trim(),
    care: document.getElementById('f_care').value.trim(),
    notes: document.getElementById('f_notes').value.trim(),
  };
}

function openAddModal(){
  document.getElementById('modalRoot').innerHTML = `
    <div class="overlay" id="overlay">
      <div class="modal">
        <h2>Add fabric</h2>
        ${fieldsForm()}
        <div class="modal-actions">
          <button class="btn ghost" id="cancelBtn">Cancel</button>
          <button class="btn" id="saveBtn">Save fabric</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('cancelBtn').onclick = closeModal;
  document.getElementById('overlay').onclick = (e)=>{ if(e.target.id==='overlay') closeModal(); };
  document.getElementById('saveBtn').onclick = async ()=>{
    const data = readForm();
    try{
      await createFabric(data);
      await loadFabrics();
      closeModal();
    }catch(e){
      alert("Couldn't save the fabric — check that the backend server is running.");
    }
  };
}

function openDetail(id){
  const f = fabrics.find(x=>x.id===id);
  if(!f) return;
  document.getElementById('modalRoot').innerHTML = `
    <div class="overlay" id="overlay">
      <div class="modal">
        <div class="swatch-block" style="background:${f.colorHex}; height:90px;"></div>
        <h2>${escapeHtml(f.name)}</h2>
        <div class="mono" style="opacity:0.65; margin-bottom:14px;">${f.sku}</div>
        <div class="form-row">
          <div><label>Category</label>${f.category}</div>
          <div><label>Composition</label>${escapeHtml(f.composition||'—')}</div>
        </div>
        <div class="form-row">
          <div><label>Color</label>${escapeHtml(f.colorName||'—')}</div>
          <div><label>Pattern / weave</label>${escapeHtml(f.pattern||'—')}</div>
        </div>
        <div class="form-row">
          <div><label>Weight</label>${f.weightGsm} GSM</div>
          <div><label>Width</label>${f.widthCm} cm</div>
        </div>
        <div class="form-row">
          <div><label>Price</label>$${Number(f.pricePerMeter).toFixed(2)}/m</div>
          <div><label>Stock</label>${f.stockMeters} m ${Number(f.stockMeters)<LOW_STOCK_THRESHOLD?'<span class="stock-flag stock-low">LOW</span>':''}</div>
        </div>
        <div class="form-row">
          <div><label>Supplier</label>${escapeHtml(f.supplier||'—')}</div>
          <div><label>Season</label>${escapeHtml(f.season||'—')}</div>
        </div>
        <div class="form-row full"><div><label>Usage</label>${escapeHtml(f.usage||'—')}</div></div>
        <div class="form-row full"><div><label>Care instructions</label>${escapeHtml(f.care||'—')}</div></div>
        ${f.notes ? `<div class="form-row full"><div><label>Notes</label>${escapeHtml(f.notes)}</div></div>` : ''}
        <div class="detail-actions">
          <button class="btn ghost" id="editBtn">Edit</button>
          <button class="btn danger" id="deleteBtn">Delete</button>
          <button class="btn" id="closeBtn" style="margin-left:auto;">Close</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('overlay').onclick = (e)=>{ if(e.target.id==='overlay') closeModal(); };
  document.getElementById('closeBtn').onclick = closeModal;
  document.getElementById('deleteBtn').onclick = async ()=>{
    if(!confirm(`Delete "${f.name}"? This can't be undone.`)) return;
    try{
      await deleteFabricApi(id);
      await loadFabrics();
      closeModal();
    }catch(e){
      alert("Couldn't delete the fabric — check that the backend server is running.");
    }
  };
  document.getElementById('editBtn').onclick = ()=>openEditModal(id);
}

function openEditModal(id){
  const f = fabrics.find(x=>x.id===id);
  document.getElementById('modalRoot').innerHTML = `
    <div class="overlay" id="overlay">
      <div class="modal">
        <h2>Edit fabric</h2>
        ${fieldsForm(f)}
        <div class="modal-actions">
          <button class="btn ghost" id="cancelBtn">Cancel</button>
          <button class="btn" id="saveBtn">Save changes</button>
        </div>
      </div>
    </div>
  `;
  document.getElementById('cancelBtn').onclick = closeModal;
  document.getElementById('overlay').onclick = (e)=>{ if(e.target.id==='overlay') closeModal(); };
  document.getElementById('saveBtn').onclick = async ()=>{
    const data = readForm();
    try{
      await updateFabricApi(id, { ...data, sku: f.sku });
      await loadFabrics();
      closeModal();
    }catch(e){
      alert("Couldn't save changes — check that the backend server is running.");
    }
  };
}

/* ---------- events ---------- */
document.getElementById('addBtn').onclick = openAddModal;
document.getElementById('resetBtn').onclick = ()=>loadFabrics();
document.getElementById('searchInput').addEventListener('input', (e)=>{ searchTerm = e.target.value; renderGrid(); });
document.getElementById('sortSelect').addEventListener('change', (e)=>{ sortMode = e.target.value; renderGrid(); });

loadFabrics();
</script>
</body>
